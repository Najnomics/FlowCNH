[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "shanghai"
via_ir = false

[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 128
depth = 50

[rpc_endpoints]
conflux_espace = "${CONFLUX_ESPACE_RPC}"
conflux_testnet = "${CONFLUX_ESPACE_TESTNET_RPC}"

[etherscan]
conflux_espace = { key = "${CONFLUXSCAN_API_KEY}", url = "https://evmapi.confluxscan.io/api" }
conflux_testnet = { key = "${CONFLUXSCAN_API_KEY}", url = "https://evmapi-testnet.confluxscan.io/api" }
